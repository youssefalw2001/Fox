name: scanner-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests base58

      - name: Compile scanner files
        run: |
          python -m py_compile modules/web3_specific_checks.py
          python -m py_compile modules/web3_asset_collector.py
          python -m py_compile modules/web3_api_mapper.py
          python -m py_compile modules/web3_js_unpacker.py
          python -m py_compile modules/solana_intel.py
          python -m py_compile modules/finding_confidence.py
          python -m py_compile modules/mega_accuracy_enhancer.py
          python -m py_compile modules/mega_exploit_verifier.py
          python -m py_compile modules/phantom_dapp_catalog.py
          python -m py_compile TEST_REAL_EXPLOITS.py
          python -m py_compile ULTIMATE_MEGA_SCANNER.py
          python -m py_compile ULTIMATE_MEGA_SCANNER_SMART.py
          python -m py_compile FIND_PHANTOM_SITES.py

      - name: Run detector tests
        run: pytest
